database:
  # Leave empty to use the default: ${HOME}/.local/viki/confluence/replica.db
  path: ""

mcp:
  # Enables the MCP write tools and demands a resolvable non-empty Confluence token.
  write_enabled: false

confluence:
  base_url: "https://gbuconfluence.oraclecorp.com"
  token: "keychain://codex_confluence_pat"
  request_timeout_seconds: 30
  parent_ids:
    - "925576634"

api:
  addr: ":8080"

logging:
  level: "INFO"

embeddings:
  provider: "ollama"
  base_url: "http://127.0.0.1:11434"
  model: "nomic-embed-text"
  request_timeout_seconds: 20
