name: confluence-replica-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in X.Y.Z format (without prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG_NAME: confluence-replica/v${{ inputs.version }}
      CHANGELOG: confluence-replica/CHANGELOG.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch and version format
        run: |
          test "${GITHUB_REF_NAME}" = "main" || { echo "Releases are allowed only from main"; exit 1; }
          echo "${VERSION}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null

      - name: Validate changelog structure
        run: python3 confluence-replica/scripts/changelog_release.py --file "${CHANGELOG}" check

      - name: Ensure tag does not exist
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag already exists: ${TAG_NAME}"
            exit 1
          fi

      - name: Ensure Unreleased has entries
        run: python3 confluence-replica/scripts/changelog_release.py --file "${CHANGELOG}" has-unreleased

      - name: Promote Unreleased to release section
        run: python3 confluence-replica/scripts/changelog_release.py --file "${CHANGELOG}" release --version "${VERSION}" --date "$(date -u +%F)"

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${CHANGELOG}"
          git commit -m "chore(confluence-replica): release ${VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Extract release notes
        run: python3 confluence-replica/scripts/changelog_release.py --file "${CHANGELOG}" extract --version "${VERSION}" > release_notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: confluence-replica v${{ env.VERSION }}
          body_path: release_notes.md
